<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SMART-HAM Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container" id="loginPage">
    <h2>SMART-HAM Login</h2>
    <input type="text" id="bagus" placeholder="Nama Perawat">
    <button onclick="login()">Masuk</button>
</div>

<div class="app-container" id="appPage" style="display:none;">
    <header>
        <h1>SMART-HAM Pro</h1>
        <p id="userDisplay"></p>
    </header>

    <div class="form-section">
        <label>Mode</label>
        <select id="mode">
            <option value="adult">Dewasa</option>
            <option value="pediatric">Pediatrik</option>
        </select>

        <label>Pilih Obat</label>
        <select id="drug" onchange="updateDoseRange()">
            <option value="norepi">Norepinephrine</option>
            <option value="dopamine">Dopamine</option>
            <option value="insulin">Insulin</option>
        </select>

        <p id="doseRange"></p>

        <label>Berat Badan (kg)</label>
        <input type="number" id="weight">

        <label>Dosis (mcg/kgBB/menit atau unit/kg/jam)</label>
        <input type="number" id="dose">

        <label>Konsentrasi (mg dalam ml)</label>
        <input type="number" id="mg" placeholder="mg">
        <input type="number" id="ml" placeholder="ml">

        <button onclick="calculate()">Hitung</button>
    </div>

    <div class="result" id="result"></div>

    <div class="log-section">
        <h3>Log Perhitungan</h3>
        <ul id="logList"></ul>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
