<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART-HAM | RSUP Dr. Hasan Sadikin</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="branding">
        <h1>SMART-HAM</h1>
        <p>Smart High Alert Medication Calculator</p>
        <small>RSUP Dr. Hasan Sadikin Bandung</small>
    </div>
</header>

<div class="container">

    <div class="card">
        <h3>Input Klinis</h3>

        <label>Mode Pasien</label>
        <select id="mode"></select>

        <label>Pilih Obat</label>
        <select id="drug"></select>

        <div id="safeRange" class="safe-range"></div>

        <label>Berat Badan (kg)</label>
        <input type="number" id="weight">

        <label>Dosis (mcg/kgBB/menit)</label>
        <input type="number" id="dose">

        <label>Konsentrasi (mg dalam total ml)</label>
        <input type="number" id="mg" placeholder="mg">
        <input type="number" id="ml" placeholder="ml">

        <button onclick="calculateDose()">Hitung</button>

        <div id="result" class="result"></div>
    </div>

    <div class="card">
        <h3>Dashboard Analitik</h3>
        <p>Total Perhitungan: <span id="totalCalc">0</span></p>
        <p>Obat Terbanyak Digunakan: <span id="mostUsed">-</span></p>
        <p>Kasus Di Luar Rentang Aman: <span id="unsafeCount">0</span></p>
    </div>

    <div class="card">
        <h3>Log Perhitungan</h3>
        <button onclick="exportCSV()">Export ke Excel</button>
        <ul id="logList"></ul>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
