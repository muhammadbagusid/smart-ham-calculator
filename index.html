<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>SMART-HAM Professional</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
    <header>
        <h1>SMART-HAM</h1>
        <p>Smart High Alert Medication Calculator</p>
    </header>

    <div class="card">

        <label>Mode Pasien</label>
        <select id="mode">
            <option value="adult">Dewasa</option>
            <option value="pediatric">Pediatrik</option>
        </select>

        <label>Pilih Obat</label>
        <select id="drug"></select>

        <div id="safeRange" class="safe-range"></div>

        <label>Berat Badan (kg)</label>
        <input type="number" id="weight">

        <label>Dosis (mcg/kgBB/menit)</label>
        <input type="number" id="dose">

        <label>Konsentrasi (mg dalam total ml)</label>
        <input type="number" id="mg" placeholder="mg">
        <input type="number" id="ml" placeholder="ml">

        <button onclick="calculateDose()">Hitung Dosis</button>

        <div id="result" class="result"></div>

    </div>

    <div class="log-card">
        <h3>Log Perhitungan</h3>
        <ul id="logList"></ul>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
